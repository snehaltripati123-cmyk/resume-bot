<script>
    let sessionId = null;
    let myChart = null;


    fetch('/comparison/create', { method: 'POST' })
        .then(r => r.json()).then(data => sessionId = data.comparison_id);

    function showToast(text) {
        const t = document.getElementById('toast');
        t.innerText = text; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    function toggleAnalytics() {
        document.getElementById('analyticsSidebar').classList.toggle('active');
        if(myChart) setTimeout(() => myChart.resize(), 100);
    }

    async function handleUpload(input) {
        if (!input.files.length) return;
        showToast("Processing Resumes...");
        const formData = new FormData();
        for (const f of input.files) formData.append('files[]', f);

        try {
            const res = await fetch(`/comparison/${sessionId}/upload`, { method: 'POST', body: formData });
            if (res.ok) {
                const data = await res.json();
                showToast(`✅ ${data.count} Resumes Uploaded!`);

                document.getElementById('dashboard-container').classList.add('active');

    try {
        const res = await fetch(`/comparison/${sessionId}/suggestions`);

        container.innerHTML = '';

            btn.className = 'suggestion-chip';
            btn.innerText = q;
            btn.onclick = () => {
                document.getElementById('userInput').value = q;
                sendMessage();
                container.innerHTML = ''; 
            };
            container.appendChild(btn);
        });
    } catch (e) {
        container.innerHTML = ''; 
    }
}

        },

<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon">🤖</div>
    <div class="logo-text">
      <div class="logo-name">ResumeBot</div>
      <div class="logo-sub">AI-powered Resume Intelligence Platform</div>
    </div>

  <a href="/" class="back-btn">← Back to Home</a>
  <button class="theme-btn">☀️</button>
</header>

<!-- MAIN -->
<div class="main">

  <!-- LEFT: Upload Panel -->
  <div class="left-panel">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <span class="section-title">Upload Resumes</span>
      <span class="uploaded-count"><span class="count-icon">👥</span><span id="uploadCount">0 uploaded</span></span>
    </div>

    <div class="upload-zone" onclick="document.getElementById('multiFileInput').click()">
      <div class="upload-icon">⬆</div>
      <p><b>Click to upload PDFs</b><br>Multiple files supported</p>
    </div>

    <div id="candidatesGrid"></div>
  </div>

  <!-- RIGHT: Charts + Chat -->
  <div class="right-panel">
    <!-- Chat input -->
    <div class="chat-bar">
      <input type="text" id="compInput" placeholder="Ask a question about the resume(s)..." onkeypress="if(event.key==='Enter') sendComparison()">
      <button class="send-btn" onclick="sendComparison()">➤</button>
    </div>

    <!-- Suggestions -->
    <div class="suggestions-row" id="suggestionSection" style="display:none;">
      <div id="chatPills"></div>
    </div>

    <!-- Content area: charts then chat -->
    <div class="charts-area" id="chartsArea">
      <!-- Default empty state -->
      <div class="empty-state" id="emptyChat">
        <div class="empty-icon">📊</div>
        <p style="font-weight:600;color:var(--text);margin-bottom:6px;">No Resumes Uploaded</p>
        <p style="font-size:0.88rem;">Upload resumes to see comparison charts and start chatting</p>
      </div>
    </div>

    <!-- Chat messages (shown alongside/below charts) -->
    <div class="chat-messages" id="chatMessages" style="display:none;max-height:280px;border-top:1px solid var(--border);"></div>
  </div>

<div id="toast"></div>
<input type="file" id="multiFileInput" multiple accept=".pdf" style="display:none" onchange="handleMultiUpload(this)">

<script>
    let sessionId = null;
    let candidates = [];
    let uploadCount = 0;

    // Create session on load
    fetch('/comparison/create', { method: 'POST' })
        .then(r => r.json())
        .then(d => sessionId = d.comparison_id);

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    async function handleMultiUpload(input) {
        const files = Array.from(input.files);
        if (!files.length) return;

        if (!sessionId) {
            const res = await fetch('/comparison/create', { method: 'POST' });
            const d = await res.json();
            sessionId = d.comparison_id;
        }

        const formData = new FormData();
        files.forEach(f => formData.append('files[]', f));

        showToast('Processing Resumes...');

        try {
            const res = await fetch(`/comparison/${sessionId}/upload`, { method: 'POST', body: formData });
            const data = await res.json();

            files.forEach((f, i) => {
                if (!candidates.find(c => c.name === f.name)) {
                    const score = data.candidates ? data.candidates[i]?.score : null;
                    candidates.push({ name: f.name, score });
                    addCandidateCard(f.name, score);
                }
            });

            uploadCount += files.length;
            document.getElementById('uploadCount').textContent = `${uploadCount} uploaded`;

            document.getElementById('emptyChat').style.display = 'none';
            loadSuggestions();
            loadDefaultCharts();
            showToast(`✅ ${files.length} Resume(s) Uploaded!`);
        } catch(e) {
            showToast('❌ Upload failed');
        }
    }

    function addCandidateCard(name, score) {
        const grid = document.getElementById('candidatesGrid');
        const div = document.createElement('div');
        div.className = 'candidate-card';
        div.id = `card-${name}`;
        div.innerHTML = `
            <div class="candidate-icon">📄</div>
            <div class="candidate-info">
                <div class="candidate-name">${name}</div>
                <div class="processed-badge">✅ Processed ${score ? `<span class="candidate-score" style="margin-left:6px;">Score: ${score}%</span>` : ''}</div>
            </div>
        `;
        grid.appendChild(div);
    }

    async function loadDefaultCharts() {
        try {
            const res = await fetch(`/comparison/${sessionId}/analyze`);
            if (!res.ok) return;
            const data = await res.json();
            const c = data.data?.candidates || [];
            if (!c.length) return;

            const chartsArea = document.getElementById('chartsArea');
            chartsArea.innerHTML = '';

            // Bar chart - overall scores
            const barCard = document.createElement('div');
            barCard.className = 'chart-card';
            barCard.innerHTML = `
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                    <h3 style="margin:0;">Candidate Comparison</h3>
                    <input type="text" id="compInputInner" placeholder="Ask a question about the resume(s)..." style="border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-size:0.85rem;outline:none;width:300px;" onkeypress="if(event.key==='Enter'){document.getElementById('compInput').value=this.value;sendComparison();}">
                </div>
                <div class="chart-wrapper"><canvas id="overallChart"></canvas></div>
            `;
            chartsArea.appendChild(barCard);

            new Chart(document.getElementById('overallChart').getContext('2d'), {
                type: 'bar',
                data: {
                    labels: c.map(x => x.name),
                    datasets: [{ label: 'Overall Score', data: c.map(x => x.relevance_score || x.score || 70), backgroundColor: '#2563eb', borderRadius: 6 }]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 100 } }, plugins: { legend: { display: true } } }
            });

            // Radar chart if skills available
            if (data.data?.skills) {
                const radarCard = document.createElement('div');
                radarCard.className = 'chart-card';
                radarCard.innerHTML = `<h3>Skills Comparison (Radar Chart)</h3><div class="chart-wrapper" style="height:300px;"><canvas id="radarChart"></canvas></div>`;
                chartsArea.appendChild(radarCard);

                const skills = data.data.skills;
                const colors = ['rgba(37,99,235,0.4)', 'rgba(124,58,237,0.4)', 'rgba(5,150,105,0.4)'];
                const borderColors = ['#2563eb', '#7c3aed', '#059669'];

                new Chart(document.getElementById('radarChart').getContext('2d'), {
                    type: 'radar',
                    data: {
                        labels: skills.labels || ['JavaScript', 'Python', 'SQL', 'Leadership', 'Communication'],
                        datasets: c.map((cand, i) => ({
                            label: cand.name,
                            data: skills.data?.[i] || [70, 80, 65, 75, 60],
                            backgroundColor: colors[i % colors.length],
                            borderColor: borderColors[i % borderColors.length],
                            borderWidth: 2
                        }))
                    },
                    options: { responsive: true, maintainAspectRatio: false, scales: { r: { beginAtZero: true, max: 100 } } }
                });
            }
        } catch(e) { console.log('Charts skipped:', e); }
    }

    async function loadSuggestions() {
        if (!sessionId) return;
        try {
            const res = await fetch(`/comparison/${sessionId}/suggestions`);
            const data = await res.json();
            const pills = document.getElementById('chatPills');
            document.getElementById('suggestionSection').style.display = 'flex';
            if (data.suggestions?.length) {
                pills.innerHTML = data.suggestions.map(s =>
                    `<span class="pill" onclick="sendComparison('${s}')">${s}</span>`
                ).join('');
            }
        } catch(e) {}
    }

    async function sendComparison(msg) {
        const input = document.getElementById('compInput');
        const message = msg || input.value.trim();
        if (!message) return;
        if (!sessionId) { showToast('Please upload resumes first.'); return; }

        const chatMessages = document.getElementById('chatMessages');
        chatMessages.style.display = 'flex';

        addMsg('user', message);
        if (!msg) input.value = '';

        const typing = addTyping();

        try {
            const res = await fetch(`/comparison/${sessionId}/chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            });
            const data = await res.json();
            typing.remove();
            addMsg('ai', data.response || 'Sorry, something went wrong.');

            if (data.graph_data) {
                renderDynamicChart(data.graph_data);
            }
        } catch(e) {
            typing.remove();
            addMsg('ai', 'Connection error.');
        }
    }

    function addMsg(type, text) {
        const chat = document.getElementById('chatMessages');
        const div = document.createElement('div');
        div.className = `message ${type}`;
        const av = `<div class="avatar ${type === 'ai' ? 'ai' : 'user-av'}">${type === 'ai' ? '✦' : 'U'}</div>`;
        const bubble = `<div class="bubble">${text.replace(/\n/g,'<br>')}</div>`;
        div.innerHTML = type === 'ai' ? av + bubble : bubble + av;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
        return div;
    }

    function addTyping() {
        const chat = document.getElementById('chatMessages');
        const div = document.createElement('div');
        div.className = 'message ai';
        div.innerHTML = `<div class="avatar ai">✦</div><div class="bubble typing"><span></span><span></span><span></span></div>`;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
        return div;
    }

    function renderDynamicChart(config) {
        const chartsArea = document.getElementById('chartsArea');
        const card = document.createElement('div');
        card.className = 'chart-card';
        const id = 'dynChart_' + Date.now();
        card.innerHTML = `<h3>${config.title || 'Analysis'}</h3><div class="chart-wrapper"><canvas id="${id}"></canvas></div>`;
        chartsArea.appendChild(card);
        new Chart(document.getElementById(id).getContext('2d'), {
            type: config.type || 'bar',
            data: { labels: config.labels, datasets: config.datasets },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }
